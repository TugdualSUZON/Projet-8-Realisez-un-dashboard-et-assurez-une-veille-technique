name: Create and publish a Docker image to github package

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# Source : https://docs.github.com/fr/actions/tutorials/publish-packages/publish-docker-images#publishing-images-to-github-packages

on:
  push:
    branches:
      - "main"
    paths:
      - "app/mlflow_api/**"
      
  workflow_dispatch: # <-- permet de lancer manuellement depuis l'UI

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>/docker_name
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.repository }}/predict_client_payment


jobs:
  unitest_with_pytest:
  
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v5
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./app/test_requirements.txt

      - name: Create .env file
        run: |
          echo "MODEL_PATH=${{vars.MODEL_PATH}}" >> .env
          echo "TEST_DATA_PATH=${{vars.TEST_DATA_PATH}}" >> .env
          
      - name: Test with pytest
        run: |
          pip install pytest pytest-cov
          pytest app/test_unitest.py --doctest-modules --junitxml=junit/test-results.xml --cov=com --cov-report=xml --cov-report=html

      - name: Upload pytest test results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: junit/test-results.xml
        # Use always() to always run this step to publish test results when there are test failures
        if: ${{ always() }}
          
  build-and-push-image:

    needs: unitest_with_pytest # Conditionne le lancement de ce jobs au précédent
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get repository info
        id: repo_info
        run: |
          repo="${{ github.repository }}"
          resp=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${repo}")
          echo "owner_type=$(echo "$resp" | jq -r .owner.type)" >> $GITHUB_OUTPUT
          echo "is_private=$(echo "$resp" | jq -r .private)" >> $GITHUB_OUTPUT

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }} # Nom 
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0 Mon ID?
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./app # Spécifier le répertoire actif
          file: ./app/Dockerfile_mlflow_api # Spécifier le dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # To know where and when the docker was build if repo publi or orga
      - name: Generate artifact attestation
        if: ${{ steps.repo_info.outputs.owner_type == 'Organization' || steps.repo_info.outputs.is_private == 'false' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

      
      - name: Deploy to Render
        if: ${{ success() }}
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
