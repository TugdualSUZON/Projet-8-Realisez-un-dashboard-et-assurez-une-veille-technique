name: Build and deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_ACR }}
          
      - name: Build Docker image
        run: |
          az acr build --registry <ACR_NAME> --image myapp:${{ github.sha }} .

      - name: Deploy to Azure Web App
        run: |
          az webapp config container set --name <WEBAPP_NAME> --resource-group <RG_NAME> --docker-custom-image-name <ACR_NAME>.azurecr.io/myapp:${{ github.sha }}
          az webapp restart --name <WEBAPP_NAME> --resource-group <RG_NAME>
