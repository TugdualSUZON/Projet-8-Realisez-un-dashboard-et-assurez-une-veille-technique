# Inspirer de ce blogpots https://medium.com/@deryayildirimm/deploying-to-render-insert-a-smoke-test-step-with-github-actions-ffbd49a104dd
name: deploy_on_render_with_api_unit_test

on:
   workflow_run:
    workflows: [Create and publish a Docker image to github package]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Image
        run: docker pull ghcr.io/tugdualsuzon/tugdualsuzon/projet-7-implementez-un-modele-de-scoring/predict_client_payment:main

      - name: Run Container
        run: docker run -d -p 8080:10000 --name app docker pull ghcr.io/tugdualsuzon/tugdualsuzon/projet-7-implementez-un-modele-de-scoring/predict_client_payment:main

      - name: Smoke Test
        run: |
          for i in {1..10}; do
            if curl -fsS http://localhost:8080; then
              echo "Smoke test passed "
              exit 0
            fi
            echo "Retrying... ($i)"
            sleep 3
          done
          echo "Smoke test failed "
          exit 1

      - name: Stop Container
        if: always()
        run: docker stop app || true
